name: DevSecOps CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  helm-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: |
          helm lint kubernetes/helm/user-service

  docker-build-push:
    runs-on: ubuntu-latest

    needs:
      - helm-lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ayushrusia21/devsecops-platform-user-service:${{ github.sha }} \
            -t ayushrusia21/devsecops-platform-user-service:latest \
            applications/user-service

      - name: Push SHA Tag
        run: |
          docker push ayushrusia21/devsecops-platform-user-service:${{ github.sha }}

      - name: Push Latest Tag
        run: |
          docker push ayushrusia21/devsecops-platform-user-service:latest

  trivy-scan:
    runs-on: ubuntu-latest

    needs:
      - docker-build-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Image For Scan
        run: |
          docker build \
            -t user-service:${{ github.sha }} \
            applications/user-service

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: user-service:${{ github.sha }}
          format: table
          exit-code: 0
